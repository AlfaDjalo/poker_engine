name: double_board_plo_bomb_pot
layout_name: double_board
payout_type: split_pot

hole_cards: 4

board_layout:
  nodes: 10
  streets:
    0: [0, 1, 2, 5, 6, 7]    # flop
    1: [3, 8]                # turn
    2: [4, 9]                # river
  street_names:
    0: "flop"
    1: "turn"
    2: "river"

points:
  - name: board1
    score_type: HIGH
    node_sets:
      - [0, 1, 2, 3, 4]

  - name: board2
    score_type: HIGH
    node_sets:
      - [5, 6, 7, 8, 9]

betting:
  type: pot_limit
  ante: 5

showdown:
  type: OMAHA

# ─────────────────────────────────────────────
# Creation phases — bomb pot: antes are posted automatically, both flops
# are dealt simultaneously *before* the first betting round (there is no
# pre-flop betting phase at all). deals_board_street references the
# board_layout.streets key (0 = flop here, since this variant's streets
# map starts at 0 for the flop, not pre-flop).
# ─────────────────────────────────────────────
creation_phases:
  - id: SETUP
    label: "Setup Players"
    deals_hole: false
    deals_board_street: null
    allows_betting: false
  - id: DEAL_HOLE
    label: "Deal Hole Cards"
    deals_hole: true
    deals_board_street: null
    allows_betting: false
  - id: DEAL_FLOP
    label: "Deal Both Flops"
    deals_hole: false
    deals_board_street: 0
    allows_betting: false
  - id: FLOP_BET
    label: "Flop Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_TURN
    label: "Deal Both Turns"
    deals_hole: false
    deals_board_street: 1
    allows_betting: false
  - id: TURN_BET
    label: "Turn Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_RIVER
    label: "Deal Both Rivers"
    deals_hole: false
    deals_board_street: 2
    allows_betting: false
  - id: RIVER_BET
    label: "River Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: SHOWDOWN
    label: "Showdown"
    deals_hole: false
    deals_board_street: null
    allows_betting: false