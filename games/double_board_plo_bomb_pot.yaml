name: double_board_plo_bomb_pot
layout_name: double_board
payout_type: split_pot

hole_cards: 4

board_layout:
  nodes: 10
  streets:
    0: [0, 1, 2, 5, 6, 7]    # flop
    1: [3, 8]                # turn
    2: [4, 9]                # river
  street_names:
    0: "flop"
    1: "turn"
    2: "river"

points:
  - name: board1
    score_type: HIGH
    node_sets:
      - [0, 1, 2, 3, 4]

  - name: board2
    score_type: HIGH
    node_sets:
      - [5, 6, 7, 8, 9]

betting:
  type: pot_limit
  ante: 5

showdown:
  type: OMAHA
