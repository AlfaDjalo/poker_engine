name: five_points_high_low_high_low_hand
layout_name: double_board
payout_type: points

hole_cards: 6

board_layout:
  nodes: 10
  streets:
    0: [0, 1, 2, 5, 6, 7]    # flop
    1: [3, 8]                # turn
    2: [4, 9]                # river

points:
  - name: high_board1
    score_type: HIGH
    node_sets:
      - [0, 1, 2, 3, 4]

  - name: low_board1
    score_type: LOW_A5
    scoop_from: high_board1
    node_sets:
      - [0, 1, 2, 3, 4]

  - name: high_board2
    score_type: HIGH
    node_sets:
      - [5, 6, 7, 8, 9]

  - name: low_board2
    score_type: LOW_A5
    scoop_from: high_board2
    node_sets:
      - [5, 6, 7, 8, 9]

  - name: hand
    score_type: HIGH
    node_sets: 
      - []
    showdown_type_override: DRAW

betting:
  type: pot_limit
  small_blind: 1
  big_blind: 2
  ante: 0

showdown:
  type: OMAHA


creation_phases:
  - id: SETUP
    label: "Setup Players"
    deals_hole: false
    deals_board_street: null
    allows_betting: false
  - id: DEAL_HOLE
    label: "Deal Hole Cards"
    deals_hole: true
    deals_board_street: null
    allows_betting: false
  - id: PREFLOP_BET
    label: "Preflop Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_FLOP
    label: "Deal Flop"
    deals_hole: false
    deals_board_street: 1
    allows_betting: false
  - id: FLOP_BET
    label: "Flop Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_TURN
    label: "Deal Turn"
    deals_hole: false
    deals_board_street: 2
    allows_betting: false
  - id: TURN_BET
    label: "Turn Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_RIVER
    label: "Deal River"
    deals_hole: false
    deals_board_street: 3
    allows_betting: false
  - id: RIVER_BET
    label: "River Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: SHOWDOWN
    label: "Showdown"
    deals_hole: false
    deals_board_street: null
    allows_betting: false
