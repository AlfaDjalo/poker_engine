name: hopscotch_bomb_pot
layout_name: hopscotch
payout_type: points

hole_cards: 4

board_layout:
  nodes: 10
  streets:
    0: [0, 1, 2, 5, 6, 7]    # flop
    1: [3]                      # turn
    2: [4]                      # river
  street_names:
    0: "flop"
    1: "turn"
    2: "river"

points:
  - name: board
    score_type: HIGH
    node_sets:
      - [0, 1, 2, 3, 4]
      - [5, 6, 7, 3, 4]

betting:
  type: pot_limit
  ante: 5

showdown:
  type: OMAHA


creation_phases:
  - id: SETUP
    label: "Setup Players"
    deals_hole: false
    deals_board_street: null
    allows_betting: false
  - id: DEAL_HOLE
    label: "Deal Hole Cards"
    deals_hole: true
    deals_board_street: null
    allows_betting: false
  - id: DEAL_FLOP
    label: "Deal Flop"
    deals_hole: false
    deals_board_street: 0
    allows_betting: false
  - id: FLOP_BET
    label: "Flop Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_TURN
    label: "Deal Turn"
    deals_hole: false
    deals_board_street: 1
    allows_betting: false
  - id: TURN_BET
    label: "Turn Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: DEAL_RIVER
    label: "Deal River"
    deals_hole: false
    deals_board_street: 2
    allows_betting: false
  - id: RIVER_BET
    label: "River Betting"
    deals_hole: false
    deals_board_street: null
    allows_betting: true
  - id: SHOWDOWN
    label: "Showdown"
    deals_hole: false
    deals_board_street: null
    allows_betting: false