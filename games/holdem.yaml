name: holdem
layout_name: single_board
payout_type: points

hole_cards: 2

board_layout:
  nodes: 5
  streets:
    0: []         # pre-flop
    1: [0, 1, 2]   # flop
    2: [3]         # turn
    3: [4]         # river
  street_names:
    0: "pre-flop"
    1: "flop"
    2: "turn"
    3: "river"

points:
  - name: main
    score_type: HIGH
    node_sets:
      - [0, 1, 2, 3, 4]

betting:
  type: no_limit
  small_blind: 1
  big_blind: 2
  ante: 0

showdown:
  type: HOLDEM
